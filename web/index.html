<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Status</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #267cd8;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 28px;
        }
        .container {
            display: flex;
            flex-direction: row;
            padding: 20px;
        }
        .sidebar {
            width: 20%;
            background: #fff;
            padding: 15px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        .sidebar a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: #333;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #007bff;
            color: white;
        }
        .main-content {
            flex-grow: 1;
            padding: 20px;
            background: white;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status-box {
            padding: 20px;
            font-size: 18px;
            border: 1px solid;
            border-radius: 5px;
            text-align: center;
            width: 100%; 
            max-width: 100%;
        }
        .occupied {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        .available {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        .chart-container {
            margin-top: 20px;
            width: 80%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            background-color: #e9ecef;
            align-items: center;
            color: #6c757d;
        }
    </style>
    <script>
        function updateStatus(status) {
            const statusBox = document.getElementById("status-box");
            if (status === "Occupied") {
                statusBox.className = "status-box occupied";
                statusBox.innerHTML = "Current status: <strong>Occupied</strong>";
            } else {
                statusBox.className = "status-box available";
                statusBox.innerHTML = "Current status: <strong>Available</strong>";
            }
        }
        document.addEventListener("DOMContentLoaded", function() {
            updateStatus("Occupied"); 
            
             // Inicijalizacija Chart.js grafikona
             const ctx = document.getElementById('occupancyChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00'],
                    datasets: [{
                        label: 'Broj zauzetosti',
                        data: [2, 3, 5, 8, 6, 4, 3, 2], // Simulirani podaci
                        backgroundColor: 'rgba(0, 123, 255, 0.5)',
                        borderColor: 'rgba(0, 123, 255, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        });
    </script>
</head>
<body>
    <div class="header">Room Status</div>
    <div class="container">
        <div class="sidebar">
            <a href="#">📊 Peak Time Reports</a>
            <a href="#">⏳ Average Occupancy Duration</a>
            <a href="#">📈 Usage Trends</a>
        </div>
        <div class="main-content">
            <div id="status-box" class="status-box">Current status: <strong>Zauzeto</strong></div>
            <div class="chart-container">
                <canvas id="occupancyChart"></canvas>
            </div>
        </div>
    </div>
</body>
</html>
